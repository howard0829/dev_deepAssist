# ──────────────────────────────────────────────────────────────
# LiteLLM 프록시 설정
#   기동:  litellm --config litellm/config.yaml --port 4000
#   Agent SDK는 ANTHROPIC_BASE_URL=http://127.0.0.1:4000 로 붙어
#   POST /v1/messages (Anthropic 포맷)을 호출한다. LiteLLM이 아래
#   model_list로 라우팅하며 Anthropic↔OpenAI 포맷을 변환한다.
#
#   ⚠ 검증 항목(§11): Agent SDK가 보내는 cache_control·thinking·
#   count_tokens 를 LiteLLM이 백엔드로 정상 변환/패스스루하는지 최소
#   왕복으로 확인할 것.
# ──────────────────────────────────────────────────────────────

model_list:
  # Agent SDK가 요청하는 기본 모델 (DEEPASSIST_MODEL=deepassist) → vLLM
  - model_name: deepassist
    litellm_params:
      # hosted_vllm/ 프리픽스 = OpenAI 호환 vLLM 엔드포인트
      model: hosted_vllm/deepassist-vllm      # = VLLM_SERVED_NAME
      api_base: http://127.0.0.1:8080/v1      # = VLLM_PORT
      api_key: "dummy"                        # vLLM은 키 검증 안 함

  # OpenAI 백엔드 (선택) — DEEPASSIST_MODEL=gpt-4o 로 전환 시 사용
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  drop_params: true          # 백엔드가 모르는 파라미터는 조용히 제거
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # = ANTHROPIC_AUTH_TOKEN
